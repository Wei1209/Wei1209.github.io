<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 東京之旅 | 旅遊行程表</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="sakura-container" id="sakura"></div>

    <header>
        <div class="container">
            <div class="hero-content">
                <span class="badge">Japan Travel 2026</span>
                <h1>東京櫻花之旅</h1>
                <p class="date-range"><i data-lucide="calendar"></i> 2026.03.25 — 2026.03.31</p>
            </div>
        </div>
    </header>

    <main class="container">
        <nav class="day-selector">
            <button class="day-btn active" data-day="all">全部行程</button>
            <button class="day-btn" data-day="0">Day 1</button>
            <button class="day-btn" data-day="1">Day 2</button>
            <button class="day-btn" data-day="2">Day 3</button>
            <button class="day-btn" data-day="3">Day 4</button>
            <button class="day-btn" data-day="4">Day 5</button>
            <button class="day-btn" data-day="5">Day 6</button>
            <button class="day-btn" data-day="6">Day 7</button>
        </nav>

        <section id="itinerary-list" class="itinerary-grid">
            <!-- Content will be injected by JavaScript -->
        </section>
    </main>

    <footer>
        <p>© 2026 Japan Itinerary Keeper. Made for your perfect trip.</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
