<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MEGAPORT 2026</title>
    <style>
        :root {
            --megaport-orange: #ff5e00;
            --megaport-orange-light: #ff7e33;
            --bg-color: var(--megaport-orange);
            --header-h: 60px;
            --cell-h: 50px;
            --stage-w: 160px;
            --time-w: 60px;

            --c-南霸天: #a2cf62;
            --c-海龍王: #9193f2;
            --c-女神龍: #f857a6;
            --c-海波浪: #00d2ff;
            --c-卡魔麥: #ff9a8b;
            --c-出頭天: #ffd200;
            --c-大雄丸: #ff416c;
            --c-藍寶石: #0082c8;
            --c-青春夢: #ffcc99;
            --c-小港祭: #8d6e63;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        body {
            margin: 0;
            background: var(--bg-color);
            color: #000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* 防止 notch 區域背景色落差 */
            padding-top: env(safe-area-inset-top);
        }

        header {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #000;
            z-index: 100;
        }

        .tabs {
            display: flex;
            gap: 4px;
            background: rgba(0, 0, 0, 0.1);
            padding: 3px;
            border-radius: 10px;
            border: 2px solid #000;
        }

        .tab {
            background: transparent;
            border: none;
            padding: 6px 12px;
            color: #000;
            border-radius: 6px;
            font-weight: 900;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: #000;
            color: var(--megaport-orange);
        }

        .search-area {
            padding: 8px 15px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        #search {
            flex: 1;
            background: #fff;
            border: 2.5px solid #000;
            border-radius: 10px;
            padding: 8px;
            font-size: 0.9rem;
            font-weight: 800;
            outline: none;
            box-shadow: 4px 4px 0px #000;
        }

        /* Timetable Grid */
        .viewport {
            flex: 1;
            overflow: auto;
            position: relative;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .grid {
            display: flex;
            position: relative;
            width: max-content;
            padding-bottom: 150px;
            /* 留給 FAB */
        }

        .grid.fav-mode {
            width: 100%;
            min-width: 100vw;
        }

        .time-col {
            width: var(--time-w);
            position: sticky;
            left: 0;
            background: var(--megaport-orange);
            z-index: 40;
            border-right: 3px solid #000;
        }

        .time-cell {
            height: var(--cell-h);
            font-size: 0.75rem;
            color: #000;
            font-weight: 950;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 2px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .time-corner {
            position: sticky;
            top: 0;
            left: 0;
            width: var(--time-w);
            height: var(--header-h);
            background: #000;
            z-index: 60;
            border-right: 3px solid #000;
            border-bottom: 3px solid #000;
        }

        .stage-col {
            width: var(--stage-w);
            position: relative;
            border-right: 1px solid rgba(0, 0, 0, 0.1);
            background-image: linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 100% var(--cell-h);
        }

        .grid.fav-mode .stage-col {
            flex: 1;
            min-width: 0;
            border-right: none;
        }

        .stage-header {
            position: sticky;
            top: 0;
            width: var(--stage-w);
            height: var(--header-h);
            background: #000;
            color: var(--st-c);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            font-weight: 950;
            border-bottom: 4px solid var(--st-c);
        }

        .grid.fav-mode .stage-header {
            width: 100%;
            border-bottom-color: #fff;
        }

        /* Slots */
        .slot {
            position: absolute;
            left: 6px;
            right: 6px;
            background: #fff;
            border: 2.5px solid #000;
            border-radius: 6px;
            padding: 8px;
            font-size: 1.1rem;
            font-weight: 950;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            line-height: 1.15;
            z-index: 20;
            box-shadow: 4px 4px 0px #000;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            word-break: break-all;
        }

        .slot.selected {
            background: #000;
            color: #fff;
            transform: scale(1.03);
            z-index: 35;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            border-color: #fff;
        }

        .grid.fav-mode .slot.selected {
            background: #fff !important;
            color: #000 !important;
            transform: scale(1);
            border-color: #000;
            box-shadow: 4px 4px 0px #000;
        }

        .slot.past {
            opacity: 0.3;
            filter: grayscale(1);
            background: #ddd;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.2);
        }

        .slot.ongoing {
            background: #000;
            color: #fff;
            border-color: #fff;
            box-shadow: 0 0 15px #fff, 8px 8px 0px #000;
            z-index: 38;
            /* 確保在現在時間線之上或靠近 */
        }

        .slot.ongoing::before {
            content: "NOW";
            position: absolute;
            top: -12px;
            right: 5px;
            font-size: 0.55rem;
            background: #f00;
            color: #fff;
            padding: 2px 5px;
            border-radius: 4px;
            animation: blink 1s infinite;
            font-weight: 950;
            border: 1px solid #000;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* 剛好重疊修正樣式 */
        .grid.fav-mode .slot.selected .t {
            border-top-color: rgba(0, 0, 0, 0.1);
        }

        .slot .a {
            display: block;
            margin-bottom: 2px;
        }

        .slot .s-name {
            font-size: 0.85rem;
            font-weight: 900;
            color: var(--st-c);
            text-transform: uppercase;
            margin-bottom: 6px;
            border: 2px solid var(--st-c);
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.05);
        }

        .slot .t {
            font-size: 0.7rem;
            font-weight: 800;
            opacity: 0.7;
            border-top: 1.5px solid rgba(0, 0, 0, 0.1);
            padding-top: 4px;
            width: 100%;
        }

        .slot.selected .t,
        .slot.ongoing .t {
            border-top-color: rgba(255, 255, 255, 0.3);
        }

        /* 現在時間紅線 */
        #now-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 3px;
            background: #ff0000;
            z-index: 39;
            pointer-events: none;
            display: none;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
        }

        #now-line::after {
            content: "NOW";
            position: absolute;
            left: var(--time-w);
            top: -10px;
            background: #f00;
            color: #fff;
            font-size: 0.6rem;
            font-weight: 950;
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Floating Scroll to Now Button */
        #jump-now {
            position: fixed;
            right: 20px;
            bottom: 90px;
            width: 50px;
            height: 50px;
            background: #000;
            color: #fff;
            border-radius: 25px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 950;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            z-index: 140;
            cursor: pointer;
            border: 2px solid #fff;
        }
    </style>
</head>

            const nowMin = now.getHours() * 60 + now.getMinutes();
            const festivalDate21 = new Date("2026-03-21T00:00:00").toDateString();
            const festivalDate22 = new Date("2026-03-22T00:00:00").toDateString();
            const isTodayFest = (day === '21' && now.toDateString() === festivalDate21) || (day === '22' && now.toDateString() === festivalDate22);

            let timeHtml = `<div style="height: ${HEADER_H}px;"></div>`;
            for (let m = startOffsetMin; m <= endOffsetMin; m += 10) {
                timeHtml += `<div class="time-cell">${minToTime(m)}</div>`;
            }
            timeCol.innerHTML = timeHtml;

            if (viewMode === 'fav') {
                mainGrid.classList.add('fav-mode');
                stageWrap.innerHTML = `<div class="stage-col" id="col-fav"><div class="stage-header" style="--st-c:#fff">我的行程 (03/${day})</div></div>`;

                const myShows = DATA[day].filter(p => favs.includes(p.a));
                myShows.sort((a, b) => timeToMin(a.t.split('-')[0]) - timeToMin(b.t.split('-')[0]));

                const lanes = [];
                myShows.forEach(p => {
                    const start = timeToMin(p.t.split('-')[0]);
                    const end = timeToMin(p.t.split('-')[1]);
                    let laneIndex = lanes.findIndex(lane => lane.every(other => {
                        const [oStart, oEnd] = other.t.split('-').map(timeToMin);
                        return end <= oStart || start >= oEnd;
                    }));
                    if (laneIndex === -1) lanes.push([p]);
                    else lanes[laneIndex].push(p);
                });

                const laneCount = lanes.length;
                lanes.forEach((lane, lIdx) => {
                    lane.forEach(p => {
                        const [sT, eT] = p.t.split('-');
                        const sM = timeToMin(sT);
                        const eM = timeToMin(eT);
                        const top = ((sM - startOffsetMin) / 10) * CELL_H + HEADER_H;
                        const h = ((eM - sM) / 10) * CELL_H;

                        let status = "";
                        if (isTodayFest) {
                            if (nowMin > eM) status = "past";
                            else if (nowMin >= sM) status = "ongoing";
                        }

                        const div = document.createElement('div');
                        div.className = `slot ${status} selected`;
                        const gap = 2;
                        div.style.top = (top + gap) + "px";
                        div.style.height = (h - (gap * 2)) + "px";
                        const laneWidth = 100 / laneCount;
                        div.style.width = `calc(${laneWidth}% - 12px)`;
                        div.style.left = `calc(${(lIdx * laneWidth)}% + 6px)`;
                        div.style.setProperty('--st-c', COLORS[p.s]);
                        div.innerHTML = `<div class="s-name" style="--st-c:${COLORS[p.s]}">${p.s}</div><div class="a">${p.a}</div><div class="t">${p.t}</div>`;
                        div.style.cursor = 'default';
                        document.getElementById('col-fav').appendChild(div);
                    });
                });
            } else {
                mainGrid.classList.remove('fav-mode');
                stageWrap.innerHTML = STAGE_ORDER.map(s => `
                    <div class="stage-col" id="col-${s}">
                        <div class="stage-header" style="--st-c:${COLORS[s]}">${s}</div>
                    </div>
                `).join('');

                DATA[day].forEach(p => {
                    if (search && !p.a.toLowerCase().includes(search) && !p.s.toLowerCase().includes(search)) return;
                    const [sT, eT] = p.t.split('-');
                    const sM = timeToMin(sT);
                    const eM = timeToMin(eT);
                    const top = ((sM - startOffsetMin) / 10) * CELL_H + HEADER_H;
                    const h = ((eM - sM) / 10) * CELL_H;

                    let status = "";
                    if (isTodayFest) {
                        if (nowMin > eM) status = "past";
                        else if (nowMin >= sM) status = "ongoing";
                    }

                    const div = document.createElement('div');
                    div.className = `slot ${status} ${favs.includes(p.a) ? 'selected' : ''}`;
                    div.style.top = top + "px";
                    div.style.height = h + "px";
                    div.style.setProperty('--st-c', COLORS[p.s]);
                    div.innerHTML = `<div class="a">${p.a}</div><div class="t">${p.t}</div>`;
                    div.onclick = () => toggleFav(p.a);
                    const col = document.getElementById('col-' + p.s);
                    if (col) col.appendChild(div);
                });
            }
        }

        // --- 手機優化邏輯 ---

        function syncNowIndicator() {
            const line = document.getElementById('now-line');
            const fab = document.getElementById('jump-now');
            const now = new Date();
            const nowMin = now.getHours() * 60 + now.getMinutes();

            const festivalDate21 = new Date("2026-03-21T00:00:00").toDateString();
            const festivalDate22 = new Date("2026-03-22T00:00:00").toDateString();
            const isTodayFest = (day === '21' && now.toDateString() === festivalDate21) || (day === '22' && now.toDateString() === festivalDate22);

            // 只有在當前選取的日期是當天，且時間在活動範圍內時顯示紅線
            if (isTodayFest && nowMin >= startOffsetMin && nowMin <= endOffsetMin) {
                const top = ((nowMin - startOffsetMin) / 10) * CELL_H + HEADER_H;
                line.style.top = top + "px";
                line.style.display = "block";
                fab.style.display = "flex";
            } else {
                line.style.display = "none";
                fab.style.display = "none";
            }
        }

        function scrollToNow() {
            const now = new Date();
            const nowMin = now.getHours() * 60 + now.getMinutes();
            if (nowMin >= startOffsetMin && nowMin <= endOffsetMin) {
                const top = ((nowMin - startOffsetMin) / 10) * CELL_H + HEADER_H;
                // 到螢幕中間
                document.getElementById('vp').scrollTo({ top: top - window.innerHeight / 2 + 100, behavior: 'smooth' });
            }
        }

        function autoScrollOnLoad() {
            const now = new Date();
            const nowMin = now.getHours() * 60 + now.getMinutes();
            // 先嘗試捲動到第一個正在進行的表演，如果沒有才捲動到目前時間
            if (nowMin >= startOffsetMin && nowMin <= endOffsetMin) {
                setTimeout(scrollToNow, 500);
            }
        }

        function toggleFav(artist) {
            const idx = favs.indexOf(artist);
            if (idx > -1) favs.splice(idx, 1);
            else favs.push(artist);
            localStorage.setItem('megaport2026_favs_vFinal', JSON.stringify(favs));
            render();
        }

        // 初始化
        setDay('21');
        autoScrollOnLoad();
        setInterval(render, 30000);
        setInterval(syncNowIndicator, 60000);
        syncNowIndicator();
    </script>
</body>
